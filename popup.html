<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 320px;
    min-height: 120px;
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid #1e2130;
    background: #161820;
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80; box-shadow: 0 0 6px #4ade8066;
    flex-shrink: 0;
  }

  .title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #64748b;
  }

  .actions {
    padding: 12px 14px;
    display: flex;
    gap: 8px;
  }

  button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 8px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  #scan {
    background: #4ade80; color: #0a0f0d; font-weight: 600;
    box-shadow: 0 0 12px #4ade8033;
  }
  #scan:hover { background: #86efac; }

  #clear {
    background: #1e2130; color: #64748b;
    border: 1px solid #2a2d3a;
  }
  #clear:hover { background: #252837; color: #94a3b8; }

  .section-label {
    padding: 8px 14px 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #334155;
  }

  #log {
    max-height: 260px;
    overflow-y: auto;
    padding: 0 14px 12px;
  }

  .log-item {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #1e2130;
    margin-bottom: 6px;
    background: #161820;
  }

  .log-item .li-title {
    font-size: 12px;
    font-weight: 500;
    color: #cbd5e1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .log-item .li-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .badge.approved { background: #14532d; color: #4ade80; }
  .badge.rejected { background: #2a1a1a; color: #f87171; }
  .badge.pending  { background: #1e2130; color: #fbbf24; }

  .li-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: #334155;
  }

  .empty {
    padding: 16px 14px;
    font-size: 12px;
    color: #334155;
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="dot"></div>
  <span class="title">Gmail Sorter · Smart Calendar</span>
</div>

<div class="actions">
  <button id="scan">⚡ Scan Emails</button>
  <button id="clear">Clear Memory</button>
</div>

<div class="section-label">Event Memory Log</div>
<div id="log"><div class="empty">No events processed yet.</div></div>

<script src="popup.js"></script>
</body>
</html>
